<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/flex.css">
    <link rel="stylesheet" href="./assets/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Luckiest+Guy&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <p class="logo-text"> TRAVEL GOALS</p>
                <div class="navigation">
                    <div class="nav-list">
                        <ul class="d-flex gap-x-1">
                            <a href="#" class="nav-item"> <li> Destinations</li> </a>
                            <a href="#" class="nav-item"> <li> About</li> </a>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="banner">
            <img src="./assets/extra-files/cities-page-2/ocean.jpg">
            <div class="slogan">
                <p> JOE'S TRAVEL PAGE</p>
                <p> Let's explore the world together</p>
            </div>
        </section>

        <section class="highlights">
            <p class="highlights-text"> HIGHLIGHTS</p>
            <div class="highlights-place d-flex justify-content-around text-align">
                <div class="highlights-place-usa">
                    <img src="./assets/extra-files/cities/miami.jpg" alt="Error">
                    <span class="place"> MIAMI</span>
                    <span class="country"> USA</span>
                </div>
                <div class="highlights-place-usa">
                    <img src="./assets/extra-files/cities/munich.jpg" alt="Error">
                    <span class="place"> MUNICH</span>
                    <span class="country"> GERMANY</span>
                </div>
                <div class="highlights-place-usa">
                    <img src="./assets/extra-files/cities/barcelona.jpg" alt="Error">
                    <span class="place"> BARCELONA</span>
                    <span class="country"> SPAIN</span>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-media-contact d-flex justify-content-center gap-x-1 align-items-center">
            <img src="./assets/extra-files/icons/insta.png" alt="Error">
            <img src="./assets/extra-files/icons/facebook.png" alt="Error">
        </div>
    </footer>

</body>
</html>
